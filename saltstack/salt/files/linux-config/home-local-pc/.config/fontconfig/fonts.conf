<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
    <!-- Default fonts definition -->
    <alias>
        <family>serif</family>
        <prefer>
            <family>Liberation Serif</family>
        </prefer>
    </alias>
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Liberation Sans</family>
        </prefer>
    </alias>
    <alias>
        <family>monospace</family>
        <prefer>
            <family>Liberation Mono</family>
        </prefer>
    </alias>

    <!-- Antialiasing: 'none', 'grayscale', or 'rgba' -->
    <match target="font">
        <edit name="antialias" mode="assign">
        <bool>true</bool>
        </edit>
    </match>
    <!-- Hinting: sharper rendering -->
    <match target="font">
        <edit name="hinting" mode="assign">
        <bool>false</bool>
        </edit>
    </match>
    <!-- Hint style: 'hintnone', 'hintslight', 'hintmedium', 'hintfull' -->
    <!-- 'hintfull' gives the crispest/least-smooth result -->
    <match target="font">
        <edit name="hintstyle" mode="assign">
        <const>hintnone</const>
        </edit>
    </match>
    <!-- Subpixel rendering: 'none', 'rgb', 'bgr', 'vrgb', 'vbgr' -->
    <!-- Use 'none' for sharpest grayscale; 'rgb' for LCD subpixel -->
    <match target="font">
        <edit name="rgba" mode="assign">
        <const>none</const>
        </edit>
    </match>
    <!-- LCD filter: 'lcddefault', 'lcdlight', 'lcdlegacy', 'lcdnone' -->
    <!-- 'lcdnone' or 'lcdlight' = less blurry -->
    <match target="font">
        <edit name="lcdfilter" mode="assign">
        <const>lcdnone</const>
        </edit>
    </match>
</fontconfig>
